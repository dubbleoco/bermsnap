<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BermSnap — Agent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{min-height:100vh;background:#0F0E0C;color:#E8E2D6;font-family:'DM Sans','Segoe UI',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0F0E0C}
::-webkit-scrollbar-thumb{background:#2E2B25;border-radius:3px}
::selection{background:#E8953A;color:#0F0E0C}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="root"></div>
<script>
const e=React.createElement;
const {useState,useEffect}=React;

const C={bg:"#0F0E0C",surface:"#1A1916",surfaceHover:"#222019",border:"#2E2B25",text:"#E8E2D6",textMuted:"#8A8475",textDim:"#5C574F",amber:"#E8953A",amberDim:"#C47A2A",amberGlow:"rgba(232,149,58,0.12)",green:"#5CB868",greenDim:"rgba(92,184,104,0.15)",red:"#D45B5B",blue:"#5B9BD4",blueDim:"rgba(91,155,212,0.15)"};

// Stage → status mapping from real data
function stageToStatus(stage,tier){
  if(!stage) return "discovery";
  var s=stage.toUpperCase();
  if(s==="RESEARCHED"&&tier==="PRIORITY") return "outreach";
  if(s==="RESEARCHED") return "lead";
  return "discovery";
}

const fmt=n=>n>=1000?"$"+(n/1000).toFixed(1)+"k":"$"+n;
const fmtN=n=>n>=1000?(n/1000).toFixed(1)+"k":""+n;
const sColor={confirmed:C.green,outreach:C.amber,lead:C.blue,discovery:C.textDim,researched:C.blue,discovered:C.textDim};
const sBg={confirmed:C.greenDim,outreach:C.amberGlow,lead:C.blueDim,discovery:"rgba(92,87,79,0.15)",researched:C.blueDim,discovered:"rgba(92,87,79,0.15)"};
const pColor={high:C.red,HIGH:C.red,med:C.amber,MEDIUM:C.amber,low:C.textDim,LOW:C.textDim};
const bc="'Barlow Condensed',sans-serif";

function fmtDate(iso){
  if(!iso) return "—";
  var d=new Date(iso+"T12:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function fmtRelDate(iso){
  if(!iso) return iso;
  var d=new Date(iso+"T12:00:00");
  var now=new Date();
  var diff=Math.round((d-now)/(1000*60*60*24));
  if(diff===0) return "Today";
  if(diff===1) return "Tomorrow";
  if(diff===-1) return "Yesterday";
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function isPast(iso){
  if(!iso) return false;
  return new Date(iso+"T23:59:59")<new Date();
}

function KPICard(p){
  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:"16px 18px",minWidth:0}},
    e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase",marginBottom:6}},p.label),
    e("div",{style:{fontSize:26,fontWeight:700,color:p.accent||C.text,fontFamily:bc,lineHeight:1}},p.value),
    p.sub&&e("div",{style:{fontSize:11,color:C.textDim,marginTop:4}},p.sub)
  );
}

function ScoreBar(p){
  var color=p.score>=90?C.green:p.score>=70?C.amber:C.textDim;
  return e("div",{style:{display:"flex",alignItems:"center",gap:6}},
    e("div",{style:{width:48,height:5,background:C.border,borderRadius:3,overflow:"hidden"}},
      e("div",{style:{width:Math.min(p.score,100)+"%",height:"100%",background:color,borderRadius:3}})
    ),
    e("span",{style:{fontSize:11,color:color,fontWeight:600,fontFamily:bc}},p.score)
  );
}

function StatusPill(p){
  var s=(p.status||"discovery").toLowerCase();
  return e("span",{style:{fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",color:sColor[s]||C.textDim,background:sBg[s]||"rgba(92,87,79,0.15)",padding:"3px 8px",borderRadius:3}},s);
}

function TopBar(p){
  var d=new Date();
  var gen=p.generated?new Date(p.generated):null;
  return e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 24px",borderBottom:"1px solid "+C.border,background:C.surface,flexWrap:"wrap",gap:10}},
    e("div",{style:{display:"flex",alignItems:"center",gap:12}},
      e("div",{style:{width:32,height:32,borderRadius:4,background:"linear-gradient(135deg,"+C.amber+","+C.amberDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:C.bg,fontFamily:bc}},"B"),
      e("div",null,
        e("div",{style:{fontSize:15,fontWeight:700,color:C.text,fontFamily:bc,letterSpacing:"0.02em"}},"BERMSNAP"),
        e("div",{style:{fontSize:10,color:C.textDim,letterSpacing:"0.04em"}},"AGENT DASHBOARD")
      )
    ),
    e("div",{style:{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}},
      e("a",{href:"https://bermsnap.com",target:"_blank",rel:"noopener",style:{fontSize:10,color:C.textMuted,letterSpacing:"0.06em",textTransform:"uppercase",padding:"4px 10px",border:"1px solid "+C.border,borderRadius:3}},"bermsnap.com"),
      e("a",{href:"https://bermsnap.smugmug.com",target:"_blank",rel:"noopener",style:{fontSize:10,color:C.amber,letterSpacing:"0.06em",textTransform:"uppercase",padding:"4px 10px",border:"1px solid "+C.amberDim,borderRadius:3,background:C.amberGlow}},"SmugMug"),
      e("div",{style:{fontSize:11,color:C.textDim}},d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}))
    )
  );
}

function RevenueYTDCard(p){
  var rev=p.revenue||{};
  var ytd=rev.actual_ytd||0;
  var pyYtd=rev.prior_year_ytd||0;
  var pyTotal=rev.prior_year_total||0;
  var hasPrior=pyYtd>0||pyTotal>0;
  var diff=ytd-pyYtd;
  var pct=pyYtd>0?Math.round((diff/pyYtd)*100):null;
  var ahead=diff>=0;
  var diffColor=diff>0?C.green:diff<0?C.red:C.textDim;
  var diffLabel=diff===0?"—":(ahead?"+":"")+fmt(Math.abs(diff))+(pct!==null?" ("+Math.abs(pct)+"% "+(ahead?"▲":"▼")+")":"");

  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:"16px 18px",minWidth:0}},
    e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase",marginBottom:8}},"Revenue YTD"),
    e("div",{style:{fontSize:26,fontWeight:700,color:C.amber,fontFamily:bc,lineHeight:1}},fmt(ytd)),
    hasPrior
      ? e("div",{style:{marginTop:8,paddingTop:8,borderTop:"1px solid "+C.border}},
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            e("span",{style:{fontSize:10,color:C.textDim}},"vs last year (same date)"),
            e("span",{style:{fontSize:11,fontWeight:700,color:diffColor,fontFamily:bc}},diffLabel)
          ),
          e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}),
          e("div",{style:{marginTop:6,height:4,background:C.border,borderRadius:2,overflow:"hidden",position:"relative"}},
            pyTotal>0?e("div",{style:{position:"absolute",left:0,top:0,height:"100%",width:Math.min((pyYtd/pyTotal)*100,100)+"%",background:C.textDim,borderRadius:2,opacity:0.5}}):null,
            pyTotal>0&&ytd>0?e("div",{style:{position:"absolute",left:0,top:0,height:"100%",width:Math.min((ytd/Math.max(pyTotal,ytd))*100,100)+"%",background:C.amber,borderRadius:2}}):null
          ),
          pyTotal>0?e("div",{style:{display:"flex",justifyContent:"space-between",marginTop:4}},
            e("span",{style:{fontSize:9,color:C.textDim}},"Last year total: "+fmt(pyTotal)),
            e("span",{style:{fontSize:9,color:C.textDim}},"Pace")
          ):e("div",{style:{fontSize:10,color:C.textDim,marginTop:4}},"Prior year: $0 (first season)")
        )
      : e("div",{style:{fontSize:11,color:C.textDim,marginTop:4}},"First season — no prior year data yet")
  );
}

function KPIStrip(p){
  var kpi=p.kpi||{};
  var pipeline=p.pipeline||{};
  var tasks=p.tasks||[];
  var openTasks=tasks.filter(function(t){return t.status!=="COMPLETE"&&t.status!=="complete"});
  var highTasks=tasks.filter(function(t){return (t.priority==="HIGH"||t.priority==="high")&&t.status!=="COMPLETE"&&t.status!=="complete"});

  var totalEvents=p.events?p.events.length:0;
  var projectedRevenue=p.events?p.events.reduce(function(s,ev){return s+(ev.projected_revenue||0)},0):0;

  return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,padding:"16px 24px"}},
    e(RevenueYTDCard,{revenue:kpi.revenue}),
    e(KPICard,{label:"Events in Pipeline",value:totalEvents,sub:(pipeline.by_stage&&pipeline.by_stage.RESEARCHED||0)+" researched"}),
    e(KPICard,{label:"Projected Revenue",value:fmt(projectedRevenue),sub:"at "+(kpi.revenue&&kpi.revenue.expected_conversion?Math.round(kpi.revenue.expected_conversion*100):18)+"% conversion"}),
    e(KPICard,{label:"Priority Events",value:(pipeline.by_tier&&pipeline.by_tier.PRIORITY)||1,sub:"score ≥ 70",accent:C.amber}),
    e(KPICard,{label:"Open Tasks",value:openTasks.length,sub:highTasks.length+" high priority",accent:highTasks.length>0?C.red:C.green}),
    e(KPICard,{label:"Outreach Sent",value:(kpi.outreach&&kpi.outreach.contacted)||0,sub:"0 confirmed yet",accent:C.textMuted})
  );
}

function FunnelSummary(p){
  var events=p.events||[];
  var byStage={DISCOVERED:0,RESEARCHED:0};
  events.forEach(function(ev){byStage[ev.stage]=(byStage[ev.stage]||0)+1});
  var stages=[
    {label:"Discovered",count:byStage.DISCOVERED||0,color:C.textDim},
    {label:"Researched",count:byStage.RESEARCHED||0,color:C.blue},
    {label:"Outreach",count:(p.kpi&&p.kpi.outreach&&p.kpi.outreach.contacted)||0,color:C.amber},
    {label:"Confirmed",count:(p.kpi&&p.kpi.outreach&&p.kpi.outreach.confirmed)||0,color:C.green}
  ];
  var mx=Math.max.apply(null,stages.map(function(s){return s.count}))||1;
  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:18}},
    e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase",marginBottom:14}},"Pipeline Funnel"),
    e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      stages.map(function(s){return e("div",{key:s.label},
        e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
          e("span",{style:{fontSize:11,color:s.color,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.04em"}},s.label),
          e("span",{style:{fontSize:18,fontWeight:700,color:s.color,fontFamily:bc}},s.count)
        ),
        e("div",{style:{height:6,background:C.border,borderRadius:3,overflow:"hidden"}},
          e("div",{style:{width:(s.count/mx)*100+"%",height:"100%",background:s.color,borderRadius:3}})
        )
      )})
    )
  );
}

function HeartbeatStatus(p){
  var kpi=p.kpi||{};
  var gen=p.generated?new Date(p.generated):null;
  var genStr=gen?gen.toLocaleDateString("en-US",{month:"short",day:"numeric"})+" "+gen.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"Unknown";
  var items=[
    {action:"data.json generated",when:genStr,ok:true},
    {action:"KPI snapshot refreshed",when:genStr,ok:true},
    {action:"Event pipeline loaded",when:genStr,ok:true},
    {action:"Task queue loaded",when:genStr,ok:true},
    {action:"Outreach contacted",when:kpi.outreach&&kpi.outreach.contacted>0?"Yes":"Pending",ok:kpi.outreach&&kpi.outreach.contacted>0},
    {action:"First booking",when:kpi.outreach&&kpi.outreach.confirmed>0?"Confirmed":"Not yet",ok:kpi.outreach&&kpi.outreach.confirmed>0}
  ];
  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:18}},
    e("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:14}},
      e("div",{style:{width:8,height:8,borderRadius:"50%",background:C.green,boxShadow:"0 0 8px "+C.green}}),
      e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase"}},"Agent Status")
    ),
    e("div",{style:{display:"flex",flexDirection:"column",gap:6}},
      items.map(function(it,i){return e("div",{key:i,style:{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:11}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8}},
          e("span",{style:{color:it.ok?C.green:C.textDim,fontSize:10}},it.ok?"●":"○"),
          e("span",{style:{color:C.text}},it.action)
        ),
        e("span",{style:{color:C.textDim,fontSize:10}},it.when)
      )})
    )
  );
}

function PlaybookLoop(){
  var steps=["Discover","Score","Contact","Follow-up","Confirm","Execute","Sell","Analyze"];
  var active=1;
  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:18}},
    e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase",marginBottom:14}},"Playbook Loop"),
    e("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
      steps.map(function(s,i){return e("div",{key:s,style:{display:"flex",alignItems:"center",gap:6}},
        e("div",{style:{fontSize:11,fontWeight:700,letterSpacing:"0.04em",textTransform:"uppercase",padding:"5px 10px",borderRadius:3,background:i<=active?C.amberGlow:"transparent",color:i===active?C.amber:i<active?C.amberDim:C.textDim,border:i===active?"1px solid "+C.amberDim:"1px solid "+C.border}},s),
        i<steps.length-1?e("span",{style:{color:i<active?C.amberDim:C.textDim,fontSize:10}},"→"):null
      )})
    )
  );
}

// Persist decisions in localStorage
var DECISIONS_KEY="bermsnap_decisions";
function loadDecisions(){try{return JSON.parse(localStorage.getItem(DECISIONS_KEY)||"{}")}catch(e){return {}}}
function saveDecision(id,val){var d=loadDecisions();d[id]=val;localStorage.setItem(DECISIONS_KEY,JSON.stringify(d));}

function AcceptReject(p){
  var dec=p.decision;
  var btnBase={fontSize:10,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase",padding:"4px 10px",borderRadius:3,cursor:"pointer",fontFamily:"inherit",transition:"all 0.1s"};
  return e("div",{style:{display:"flex",gap:4,alignItems:"center"}},
    dec==="ACCEPTED"
      ? e("span",{style:{fontSize:10,fontWeight:700,color:C.green,letterSpacing:"0.06em",textTransform:"uppercase",padding:"4px 10px",background:C.greenDim,borderRadius:3,border:"1px solid "+C.green}}, "✓ ACCEPTED")
      : dec==="REJECTED"
      ? e("span",{style:{fontSize:10,fontWeight:700,color:C.red,letterSpacing:"0.06em",textTransform:"uppercase",padding:"4px 10px",background:"rgba(212,91,91,0.12)",borderRadius:3,border:"1px solid "+C.red}}, "✕ REJECTED")
      : e(React.Fragment,null,
          e("button",{onClick:function(x){x.stopPropagation();p.onAccept();},style:Object.assign({},btnBase,{background:C.greenDim,color:C.green,border:"1px solid rgba(92,184,104,0.4)"})},"✓"),
          e("button",{onClick:function(x){x.stopPropagation();p.onReject();},style:Object.assign({},btnBase,{background:"rgba(212,91,91,0.1)",color:C.red,border:"1px solid rgba(212,91,91,0.3)"})},"✕")
        ),
    dec&&e("button",{onClick:function(x){x.stopPropagation();p.onClear();},style:Object.assign({},btnBase,{background:"transparent",color:C.textDim,border:"1px solid transparent",fontSize:9,padding:"4px 6px"})},"↩")
  );
}

function EventPipeline(p){
  var events=p.events||[];
  var decState=useState(function(){return loadDecisions();}),decisions=decState[0],setDecisions=decState[1];
  var st=useState("all"),filter=st[0],setFilter=st[1];
  var stages=["all","RESEARCHED","DISCOVERED","ACCEPTED","REJECTED"];

  function decide(id,val){
    saveDecision(id,val);
    setDecisions(function(prev){var n=Object.assign({},prev);n[id]=val;return n;});
  }
  function clearDecision(id){
    var d=loadDecisions();delete d[id];localStorage.setItem(DECISIONS_KEY,JSON.stringify(d));
    setDecisions(function(prev){var n=Object.assign({},prev);delete n[id];return n;});
  }

  var filtered=events.filter(function(x){
    if(filter==="all") return true;
    if(filter==="ACCEPTED") return decisions[x.id]==="ACCEPTED";
    if(filter==="REJECTED") return decisions[x.id]==="REJECTED";
    return x.stage===filter;
  });

  var accepted=Object.values(decisions).filter(function(v){return v==="ACCEPTED"}).length;
  var rejected=Object.values(decisions).filter(function(v){return v==="REJECTED"}).length;
  var pending=events.length-accepted-rejected;

  var heads=["Event","Date","Location","Riders","Score","Stage","Proj. Revenue","Decision"];

  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:18,overflow:"hidden"}},
    e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}},
      e("div",{style:{display:"flex",alignItems:"center",gap:12}},
        e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase"}},"Event Pipeline ("+events.length+")"),
        e("span",{style:{fontSize:10,color:C.green}},accepted+" accepted"),
        e("span",{style:{fontSize:10,color:C.red}},rejected+" rejected"),
        e("span",{style:{fontSize:10,color:C.textDim}},pending+" pending")
      ),
      e("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},
        stages.map(function(s){return e("button",{key:s,onClick:function(){setFilter(s)},style:{fontSize:10,fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",padding:"3px 8px",borderRadius:3,cursor:"pointer",background:filter===s?C.amberGlow:"transparent",color:filter===s?C.amber:C.textDim,border:filter===s?"1px solid "+C.amberDim:"1px solid transparent",fontFamily:"inherit"}},s)})
      )
    ),
    e("div",{style:{overflowX:"auto"}},
      e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:800}},
        e("thead",null,e("tr",{style:{borderBottom:"1px solid "+C.border}},
          heads.map(function(h){return e("th",{key:h,style:{textAlign:"left",padding:"6px 8px",fontSize:10,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",color:C.textDim}},h)})
        )),
        e("tbody",null,
          filtered.map(function(ev,i){
            var status=stageToStatus(ev.stage,ev.tier);
            var dec=decisions[ev.id];
            var rowBg=dec==="ACCEPTED"?"rgba(92,184,104,0.04)":dec==="REJECTED"?"rgba(212,91,91,0.04)":"transparent";
            return e("tr",{key:ev.id,
              style:{borderBottom:i<filtered.length-1?"1px solid "+C.border:"none",background:rowBg,opacity:dec==="REJECTED"?0.55:1},
              onMouseEnter:function(x){x.currentTarget.style.background=dec==="ACCEPTED"?"rgba(92,184,104,0.08)":dec==="REJECTED"?"rgba(212,91,91,0.08)":C.surfaceHover},
              onMouseLeave:function(x){x.currentTarget.style.background=rowBg}},
              e("td",{style:{padding:"10px 8px"}},
                e("div",{style:{color:ev.tier==="PRIORITY"?C.amber:C.text,fontWeight:500}},ev.name),
                ev.tier==="PRIORITY"?e("div",{style:{fontSize:9,color:C.amber,letterSpacing:"0.06em",textTransform:"uppercase",marginTop:2}},"★ PRIORITY"):null
              ),
              e("td",{style:{padding:"10px 8px",color:C.textMuted,whiteSpace:"nowrap"}},fmtDate(ev.date)),
              e("td",{style:{padding:"10px 8px",color:C.textDim,fontSize:11}},ev.location||"—"),
              e("td",{style:{padding:"10px 8px",color:C.text,fontFamily:bc,fontWeight:600}},(ev.est_riders||0).toLocaleString()),
              e("td",{style:{padding:"10px 8px"}},e(ScoreBar,{score:ev.score||0})),
              e("td",{style:{padding:"10px 8px"}},e(StatusPill,{status:status})),
              e("td",{style:{padding:"10px 8px",color:ev.projected_revenue?C.green:C.textDim,fontFamily:bc,fontWeight:600}},ev.projected_revenue?"$"+ev.projected_revenue.toLocaleString():"—"),
              e("td",{style:{padding:"6px 8px"}},e(AcceptReject,{decision:dec,onAccept:function(){decide(ev.id,"ACCEPTED");},onReject:function(){decide(ev.id,"REJECTED");},onClear:function(){clearDecision(ev.id);}}))
            );
          })
        )
      )
    ),
    events.length===0?e("div",{style:{textAlign:"center",padding:"32px",color:C.textDim,fontSize:12}},"No events in pipeline yet."):null
  );
}

function TaskQueue(p){
  var tasks=(p.tasks||[]).filter(function(t){return t.status!=="COMPLETE"&&t.status!=="complete"});
  var done_tasks=(p.tasks||[]).filter(function(t){return t.status==="COMPLETE"||t.status==="complete"});
  var st=useState(new Set()),done=st[0],setDone=st[1];
  var toggle=function(id){setDone(function(prev){var n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n})};
  var all=[].concat(tasks,done_tasks);

  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:18}},
    e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase",marginBottom:12}},"Task Queue ("+tasks.length+" open)"),
    all.length===0?e("div",{style:{textAlign:"center",padding:"24px",color:C.textDim,fontSize:12}},"No tasks."):
    e("div",{style:{display:"flex",flexDirection:"column",gap:2}},
      all.map(function(t){
        var isDone=done.has(t.id)||(t.status==="COMPLETE"||t.status==="complete");
        var pri=(t.priority||"low").toUpperCase();
        var dueStr=fmtRelDate(t.due);
        var overdue=!isDone&&t.due&&isPast(t.due)&&dueStr!=="Today";
        return e("div",{key:t.id,onClick:function(){toggle(t.id)},
          style:{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 8px",borderRadius:4,cursor:"pointer",opacity:isDone?0.4:1},
          onMouseEnter:function(x){x.currentTarget.style.background=C.surfaceHover},
          onMouseLeave:function(x){x.currentTarget.style.background="transparent"}},
          e("div",{style:{width:16,height:16,borderRadius:3,flexShrink:0,marginTop:1,border:isDone?"2px solid "+C.green:"2px solid "+C.border,background:isDone?C.greenDim:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:C.green}},isDone?"✓":null),
          e("span",{style:{display:"inline-block",width:7,height:7,borderRadius:"50%",background:pColor[pri]||C.textDim,flexShrink:0,marginTop:4}}),
          e("div",{style:{flex:1,minWidth:0}},
            e("div",{style:{fontSize:12,color:C.text,fontWeight:500,textDecoration:isDone?"line-through":"none"}},t.title||t.task||"—"),
            t.description?e("div",{style:{fontSize:10,color:C.textDim,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},t.description):null
          ),
          e("span",{style:{fontSize:10,fontWeight:600,letterSpacing:"0.04em",textTransform:"uppercase",color:C.textDim,background:"rgba(92,87,79,0.12)",padding:"2px 6px",borderRadius:2,flexShrink:0}},t.type||"task"),
          e("span",{style:{fontSize:11,color:overdue?C.red:dueStr==="Today"?C.red:dueStr==="Tomorrow"?C.amber:C.textMuted,fontWeight:500,flexShrink:0,whiteSpace:"nowrap"}},dueStr||"—")
        );
      })
    )
  );
}

function Flags(p){
  var kpi=p.kpi||{};
  var flags=kpi.flags||{};
  var items=[];
  if(flags.competition_detected&&flags.competition_detected.length){
    flags.competition_detected.forEach(function(f){items.push({icon:"⚠",color:C.amber,text:f})});
  }
  if(flags.scheduling_conflicts&&flags.scheduling_conflicts.length){
    flags.scheduling_conflicts.forEach(function(f){items.push({icon:"📅",color:C.blue,text:f})});
  }
  Object.keys(flags).forEach(function(k){
    if(k==="competition_detected"||k==="scheduling_conflicts") return;
    items.push({icon:"ℹ",color:C.textMuted,text:flags[k]});
  });
  if(!items.length) return null;
  return e("div",{style:{background:C.surface,border:"1px solid "+C.border,borderRadius:6,padding:18}},
    e("div",{style:{fontSize:11,fontWeight:600,letterSpacing:"0.08em",color:C.textMuted,textTransform:"uppercase",marginBottom:12}},"Flags & Notes"),
    e("div",{style:{display:"flex",flexDirection:"column",gap:8}},
      items.map(function(it,i){return e("div",{key:i,style:{display:"flex",gap:10,fontSize:12}},
        e("span",{style:{flexShrink:0,fontSize:14}},it.icon),
        e("span",{style:{color:it.color||C.textMuted}},it.text)
      )})
    )
  );
}

function LoadingScreen(){
  return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}},
    e("div",{style:{width:40,height:40,borderRadius:6,background:"linear-gradient(135deg,"+C.amber+","+C.amberDim+")",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:20,color:C.bg,fontFamily:bc}},"B"),
    e("div",{style:{fontSize:13,color:C.textMuted,letterSpacing:"0.08em"}},"LOADING DASHBOARD...")
  );
}

function ErrorScreen(p){
  return e("div",{style:{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}},
    e("div",{style:{fontSize:32}},"📡"),
    e("div",{style:{fontSize:14,color:C.red,fontWeight:600}},"Failed to load data"),
    e("div",{style:{fontSize:12,color:C.textDim,maxWidth:300,textAlign:"center"}},(p.error||"").toString()),
    e("button",{onClick:p.onRetry,style:{marginTop:8,padding:"8px 20px",background:C.amberGlow,border:"1px solid "+C.amberDim,borderRadius:4,color:C.amber,fontSize:12,fontWeight:600,cursor:"pointer",letterSpacing:"0.06em",textTransform:"uppercase",fontFamily:"inherit"}},"RETRY")
  );
}

function App(){
  var dataState=useState(null),data=dataState[0],setData=dataState[1];
  var loadState=useState(true),loading=loadState[0],setLoading=loadState[1];
  var errState=useState(null),error=errState[0],setError=errState[1];
  var tickState=useState(0),setTick=tickState[1];

  function load(){
    setLoading(true);
    setError(null);
    fetch("data.json?t="+Date.now())
      .then(function(r){
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      })
      .then(function(d){
        setData(d);
        setLoading(false);
      })
      .catch(function(err){
        setError(err.message||"Unknown error");
        setLoading(false);
      });
  }

  useEffect(function(){load();},[]);

  if(loading) return e(LoadingScreen);
  if(error) return e(ErrorScreen,{error:error,onRetry:load});
  if(!data) return e(LoadingScreen);

  var kpi=data.kpi||{};
  var pipeline=kpi.pipeline||{};
  var events=data.events||[];
  var tasks=data.tasks||[];
  var gen=data.generated?new Date(data.generated):null;
  var genStr=gen?gen.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+" "+gen.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):"—";

  return e("div",{style:{minHeight:"100vh",background:C.bg}},
    e(TopBar,{generated:data.generated}),
    e(KPIStrip,{kpi:kpi,pipeline:pipeline,events:events,tasks:tasks}),
    e("div",{style:{padding:"0 24px 24px",display:"flex",flexDirection:"column",gap:14}},
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 280px 280px",gap:14,flexWrap:"wrap"}},
        e(FunnelSummary,{events:events,kpi:kpi}),
        e(HeartbeatStatus,{kpi:kpi,generated:data.generated}),
        e(Flags,{kpi:kpi})
      ),
      e(PlaybookLoop),
      e("div",{style:{display:"grid",gridTemplateColumns:"1fr 400px",gap:14}},
        e(EventPipeline,{events:events}),
        e(TaskQueue,{tasks:tasks})
      ),
      e("div",{style:{textAlign:"center",padding:"16px 0 8px",fontSize:10,color:C.textDim,letterSpacing:"0.06em"}},
        "BERM AGENT · bermsnap.com · Last synced: "+genStr+" · ",
        e("a",{onClick:load,style:{color:C.amber,cursor:"pointer",letterSpacing:"0.04em"}},"REFRESH")
      )
    )
  );
}

ReactDOM.render(e(App),document.getElementById("root"));
</script>
</body>
</html>
